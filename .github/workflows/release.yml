name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: build universal + dist
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: install Rust + cross targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: install musl-cross (for guest helpers)
        run: brew install FiloSottile/musl-cross/musl-cross || true

      - name: cargo cache
        uses: Swatinem/rust-cache@v2

      - name: build universal binaries
        run: make universal

      - name: pack dist tarball
        run: make dist

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
            scripts/install.sh
          generate_release_notes: true
