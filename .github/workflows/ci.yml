name: CI

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes to a branch/PR cancel in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    # vmette is macOS-only (Apple Virtualization.framework); lint/test on macOS.
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the channel + rustfmt/clippy components, which
      # rustup installs on the first cargo invocation below.
      - uses: Swatinem/rust-cache@v2
      - name: Formatting
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace
